# Keeps poll_log.json / dyfi_pings.json fresh on GitHub Pages dashboard
# even when the Windows Task Scheduler machine is offline.
name: Pipeline poll and push

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pipeline-push-main
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt requests

      - name: Write .env for RINEX and Discord (from repo secrets)
        env:
          EARTHDATA_USER: ${{ secrets.EARTHDATA_USER }}
          EARTHDATA_PASS: ${{ secrets.EARTHDATA_PASS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$EARTHDATA_USER" ] || [ -z "$EARTHDATA_PASS" ]; then
            echo "::warning::EARTHDATA_USER / EARTHDATA_PASS secrets not set — RINEX downloads will fail"
            exit 0
          fi
          printf 'EARTHDATA_USER=%s\nEARTHDATA_PASS=%s\n' "$EARTHDATA_USER" "$EARTHDATA_PASS" > .env
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            printf 'DISCORD_WEBHOOK_URL=%s\n' "$DISCORD_WEBHOOK_URL" >> .env
          else
            echo "::warning::DISCORD_WEBHOOK_URL secret not set — retroactive Discord alerts disabled in CI"
          fi

      - name: Full pipeline (RINEX cache + detector; needs Earthdata secrets)
        env:
          EARTHDATA_USER: ${{ secrets.EARTHDATA_USER }}
          EARTHDATA_PASS: ${{ secrets.EARTHDATA_PASS }}
        run: python pipeline.py --once

      - name: Commit and push dashboard JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add poll_log.json event_queue.json dyfi_pings.json running_log.json
          if git diff --cached --quiet; then
            echo "No JSON changes"
            exit 0
          fi
          git commit -m "CI: pipeline JSON update $(date -u +%Y-%m-%dT%H:%MZ)"
          # Pipeline may touch other tracked files; rebase requires a clean tree
          git restore .
          git rebase origin/main
          git push origin main
