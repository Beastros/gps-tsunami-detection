name: Outbreak dashboard — GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'outbreak-dashboard/**'
      - '.github/workflows/outbreak-dashboard-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: outbreak-dashboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: outbreak-dashboard/package-lock.json

      - name: Install and build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        working-directory: outbreak-dashboard
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: outbreak-dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
